# Global auth
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# Standard MQTT — internal only
listener 1883

# WebSocket MQTT — exposed externally on 9001
# MISCONFIGURATION: broker accessible from outside internal network
listener 9001
protocol websockets

log_type error
log_type warning
log_dest stdout

persistence true
persistence_location /mosquitto/data/
